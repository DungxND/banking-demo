# ============================================================
# values.yaml — single source of truth for versions + shared defaults.
# Helm deep-merges these over charts/<name>/values.yaml.
# Templates need no changes; per-chart values remain as fallback.
# ============================================================

# ── Infrastructure image versions ───────────────────────────
postgres:
  image:
    tag: "18"

redis:
  image:
    tag: "8-alpine"

rabbitmq:
  image:
    tag: "4-management-alpine"
  secretRef:
    name: rabbitmq-connection-secret
    usernameKey: rabbitmq-username
    passwordKey: rabbitmq-password

# ── Kong version ─────────────────────────────────────────────
kong:
  image:
    tag: "3.9"
  # livenessProbe must live here — charts/kong/values.yaml is loaded
  # via -f flag (higher precedence) and would override this if duplicated there.
  livenessProbe:
    enabled: true
    command: ["kong", "health"]
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

# ── App services — image + shared defaults in one block each ─
# Each service block is the complete override set:
#   image (registry + tag), secretRef, rabbitmqSecretRef, resources, securityContext.
# Per-chart files only keep: port, probes, replicas, pullPolicy.
# Override at deploy: --set auth-service.image.tag=abc123
#                     --set auth-service.resources.limits.memory=1Gi

auth-service:
  image:
    repository: ghcr.io/dungxnd/banking-demo/auth-service
    tag: latest
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  rabbitmqSecretRef:
    name: rabbitmq-connection-secret
    key: RABBITMQ_URL
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

