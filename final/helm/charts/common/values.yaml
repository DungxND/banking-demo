# Shared configuration — global, namespace, secret, ingress
global:
  namespace: banking
  secretName: banking-db-secret
  # Single source of truth for CORS. Kong reads this via .Values.global.corsOrigins.
  # Each backend service also receives it as CORS_ORIGINS env var.
  # For EC2 without a domain, "*" allows any origin.
  # Once you have a domain, restrict this: "https://app.example.com"
  corsOrigins: "*"

namespace:
  enabled: true

secret:
  enabled: true
  postgresUser: banking
  postgresPassword: bankingpass
  postgresDb: banking
  databaseUrl: "postgresql://banking:bankingpass@postgres:5432/banking"
  redisUrl: "redis://redis:6379/0"
  rabbitmqUser: banking
  rabbitmqPassword: bankingpass
  rabbitmqUrl: "amqp://banking:bankingpass@rabbitmq:5672/"

dbMigration:
  enabled: false
  image: "postgres:18-alpine"
  hookWeight: "-10"
  backoffLimit: 2
  activeDeadlineSeconds: 300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

externalPostgres:
  enabled: false
  host: "db.example.local"
  port: "5432"
  db: "banking"
  user: "banking"

smokeTest:
  enabled: false
  image: "curlimages/curl:8.11.0"
  hookWeight: "10"
  backoffLimit: 1
  activeDeadlineSeconds: 120
  authUser: "smoke-user"
  authPassword: "smoke-pass"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Ingress ──────────────────────────────────────────────────
# Kong is now the single edge gateway (NodePort 80).
# The Ingress resource is disabled by default.
# Re-enable only if you switch kong.service.type to ClusterIP
# and want an external Ingress controller in front of Kong.
ingress:
  enabled: false
  className: traefik
  host: ""
  name: banking-ingress
  paths:
    - path: /
      pathType: Prefix
      serviceName: kong
      servicePort: 8000

kongExternalService:
  enabled: false
