notification-service:
  fullnameOverride: notification-service
  enabled: true
  image:
    pullPolicy: Always
  imagePullSecrets: []
  replicas: 1
  service:
    port: 8004
    portName: http
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  rabbitmqSecretRef:
    name: rabbitmq-connection-secret
    key: RABBITMQ_URL
  corsOrigins: ""   # fallback to global.corsOrigins — do not set here
  extraEnv: {}
  readinessProbe:
    enabled: true
    path: /health
    port: 8004
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
