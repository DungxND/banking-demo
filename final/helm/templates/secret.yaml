{{- if .Values.secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "banking-demo.secretName" . }}
  namespace: {{ include "banking-demo.namespace" . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secret.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secret.postgresDb | quote }}
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secret.redisUrl | quote }}
---
# RabbitMQ — connection URL (consumed by api-producer and all consumers)
#           + pod credentials (consumed by the RabbitMQ StatefulSet env vars)
# Both live in the same release namespace; no separate "rabbit" namespace needed.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-connection-secret
  namespace: {{ include "banking-demo.namespace" . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  RABBITMQ_URL: {{ .Values.secret.rabbitmqUrl | quote }}
  rabbitmq-username: {{ .Values.secret.rabbitmqUser | quote }}
  rabbitmq-password: {{ .Values.secret.rabbitmqPassword | quote }}
{{- end }}
