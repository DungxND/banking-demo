# Instana Agent configuration for banking-demo
# Mount at: /opt/instana/agent/etc/instana/configuration.yaml
#
# Hot-reloaded: most settings take effect without agent restart.
# Merge order: configuration-*.yaml files merged alphabetically.

# ---------------------------------------------------------------------------
# OpenTelemetry — accept OTLP from Python services (gRPC :4317, HTTP :4318)
# ---------------------------------------------------------------------------
com.instana.plugin.opentelemetry:
  enabled: true

# ---------------------------------------------------------------------------
# Python — disable auto-instrumentation (we use OTel SDK, not instana pkg)
# ---------------------------------------------------------------------------
com.instana.plugin.python:
  enabled: false

# ---------------------------------------------------------------------------
# PostgreSQL monitoring
# Requires track_counts, track_activities, track_io_timing ON in postgresql.conf
# ---------------------------------------------------------------------------
com.instana.plugin.postgresql:
  user: banking
  password: bankingpass
  database: banking

# ---------------------------------------------------------------------------
# Tracing — forward OTel traceparent/tracestate headers across services
# ---------------------------------------------------------------------------
com.instana.tracing:
  extra-http-headers:
    - traceparent
    - tracestate

# ---------------------------------------------------------------------------
# Secrets — redact sensitive keys from collected config/env data
# ---------------------------------------------------------------------------
com.instana.secrets:
  matcher: contains-ignore-case
  list:
    - password
    - secret
    - key
    - token
    - DATABASE_URL
    - REDIS_URL
