# Phase 1: Secrets for DB and Redis
# WARNING: Plain-text credentials — for demo only.
# In production use Sealed Secrets, Vault, or External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: banking-db-secret
  namespace: banking
type: Opaque
stringData:
  POSTGRES_USER: banking
  POSTGRES_PASSWORD: bankingpass
  POSTGRES_DB: banking
  DATABASE_URL: "postgresql://banking:bankingpass@postgres:5432/banking"
  REDIS_URL: "redis://redis:6379/0"
