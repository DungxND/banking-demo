# Phase 1: Kong declarative config (ConfigMap — template)
# Prometheus plugin — required by the Instana Kong sensor for
# latency, bandwidth, and request metrics via /metrics on admin port.
# upstream_health_metrics disabled: active health checks block the /metrics
# response when upstream pods are slow, causing Instana sensor timeouts.
# OpenTelemetry plugin — sends Kong spans to Instana agent via OTLP/HTTP :4318.
# NODE_IP_PLACEHOLDER is substituted at pod start by the init container in
# kong.yaml using the pod's status.hostIP — no hardcoded IP anywhere.
# Propagation: extract+inject instana headers so the trace chain
# Traefik → Kong → FastAPI is stitched into a single waterfall in Instana.
# CORS plugins removed — handled at the frontend/ingress layer for k8s.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: banking
data:
  kong.yml.template: |
    _format_version: "3.0"
    _transform: true

    plugins:
      - name: prometheus
        config:
          status_code_metrics: true
          latency_metrics: true
          bandwidth_metrics: true
          upstream_health_metrics: false

      - name: opentelemetry
        config:
          traces_endpoint: "http://NODE_IP_PLACEHOLDER:4318/v1/traces"
          resource_attributes:
            service.name: "kong"
          # header_type: preserve — passes through whatever tracing header the
          # caller sent. 'propagation' object not supported in kong:3.9.
          header_type: preserve
          sampling_rate: 1.0

    services:
      - name: auth-service
        url: http://auth-service:8001
        routes:
          - name: auth-route
            paths:
              - /api/auth
            strip_path: true

      - name: account-service
        url: http://account-service:8002
        routes:
          - name: account-route
            paths:
              - /api/account
            strip_path: true

      - name: transfer-service
        url: http://transfer-service:8003
        routes:
          - name: transfer-route
            paths:
              - /api/transfer
            strip_path: true

      - name: notification-service
        url: http://notification-service:8004
        routes:
          - name: notification-route
            paths:
              - /api/notifications
            strip_path: true
          - name: notification-ws-route
            paths:
              - /ws
            strip_path: false
            protocols:
              - http
              - https
