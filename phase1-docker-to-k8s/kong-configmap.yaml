# Phase 1: Kong declarative config (ConfigMap)
# Prometheus plugin — required by the Instana Kong sensor for
# latency, bandwidth, and request metrics via /metrics on admin port.
# upstream_health_metrics disabled: active health checks block the /metrics
# response when upstream pods are slow, causing Instana sensor timeouts.
# OpenTelemetry plugin removed: Kong's OTel plugin injects traceparent headers
# that conflict with the Instana Python sensor (autowrapt), causing
# TypeError: parent_context must be an Instana SpanContext or None.
# Kong appears in Instana Infrastructure via the Prometheus sensor instead.
# CORS plugins removed — handled at the frontend/ingress layer for k8s.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: banking
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    plugins:
      - name: prometheus
        config:
          status_code_metrics: true
          latency_metrics: true
          bandwidth_metrics: true
          upstream_health_metrics: false

    services:
      - name: auth-service
        url: http://auth-service:8001
        routes:
          - name: auth-route
            paths:
              - /api/auth
            strip_path: true

      - name: account-service
        url: http://account-service:8002
        routes:
          - name: account-route
            paths:
              - /api/account
            strip_path: true

      - name: transfer-service
        url: http://transfer-service:8003
        routes:
          - name: transfer-route
            paths:
              - /api/transfer
            strip_path: true

      - name: notification-service
        url: http://notification-service:8004
        routes:
          - name: notification-route
            paths:
              - /api/notifications
            strip_path: true
          - name: notification-ws-route
            paths:
              - /ws
            strip_path: false
            protocols:
              - http
              - https
