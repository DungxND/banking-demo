# Phase 1: Auth Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: banking
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: banking-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: banking-demo
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
      imagePullSecrets:
        - name: github-registry
      containers:
        - name: auth-service
          image: ghcr.io/dungxnd/banking-demo/auth-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8001
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banking-db-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: banking-db-secret
                  key: REDIS_URL
            - name: SESSION_TTL_SECONDS
              value: "86400"
            - name: CORS_ORIGINS
              value: "http://localhost:3000"
            - name: OTEL_SERVICE_NAME
              value: auth-service
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=banking-demo,deployment.environment=production
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4317"
            # Instana process-level sensor — resolves python_sensor_not_installed.
            # Activates the instana package via autowrapt (no code changes needed).
            # Works alongside OTel: sensor provides CPU/mem/GC metrics + service
            # fingerprinting; OTel provides distributed traces via OTLP/gRPC.
            - name: AUTOWRAPT_BOOTSTRAP
              value: instana
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: banking
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: banking-demo
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
      name: http
