# Phase 1: Kong API Gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: banking
  labels:
    app: kong
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: banking-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
        app.kubernetes.io/name: kong
        app.kubernetes.io/part-of: banking-demo
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: dockerhub-registry
      # Init container: substitute NODE_IP into the kong.yml template so the
      # OpenTelemetry plugin endpoint is set to the actual host IP at pod start.
      # No hardcoded IP anywhere — status.hostIP is resolved by Kubernetes.
      initContainers:
        - name: kong-config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s/NODE_IP_PLACEHOLDER/${NODE_IP}/g" \
                /kong-template/kong.yml.template > /kong-rendered/kong.yml
              echo "Kong config rendered with NODE_IP=${NODE_IP}"
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: kong-config-template
              mountPath: /kong-template
              readOnly: true
            - name: kong-config-rendered
              mountPath: /kong-rendered
      containers:
        - name: kong
          image: kong:3.9
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/kong.yml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            # Admin bound to 0.0.0.0 — Instana Host Agent reaches it via
            # NodePort 32001 → localhost:32001 (host can't resolve k8s DNS).
            # In production, restrict via NetworkPolicy, not loopback binding.
            - name: KONG_ADMIN_LISTEN
              value: 0.0.0.0:8001
            - name: KONG_PROXY_LISTEN
              value: 0.0.0.0:8000
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "1"
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          volumeMounts:
            - name: kong-config-rendered
              mountPath: /kong
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command: ["kong", "health"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["kong", "health"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: kong-config-template
          configMap:
            name: kong-config
        - name: kong-config-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: banking
  labels:
    app: kong
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: banking-demo
spec:
  type: NodePort
  selector:
    app: kong
  ports:
    - port: 8000
      targetPort: 8000
      name: proxy
      nodePort: 32000
    - port: 8001
      targetPort: 8001
      name: admin
      nodePort: 32001
